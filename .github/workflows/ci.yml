#
# Exim Rust Rewrite — Continuous Integration Pipeline
#
# Pipeline stages (in strict order, failure at any stage is blocking):
#   1. cargo fmt --check        — Formatting verification
#   2. cargo clippy -D warnings — Lint analysis (zero diagnostics)
#   3. cargo test               — Full workspace test suite
#   4. cargo build --release    — Optimized release build
#
# Gate 2 compliance: RUSTFLAGS="-D warnings" is enforced at every stage
# via .cargo/config.toml AND the explicit environment variable below.

name: Exim Rust CI

on:
  push:
    branches: [ main, master, 'blitzy-*' ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: Rust CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # -------------------------------------------------------------------
      # Setup
      # -------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (FFI libraries)
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential clang llvm-dev libclang-dev pkg-config cmake \
            libpam0g-dev libgsasl-dev libkrb5-dev libspf2-dev \
            libdb-dev libgdbm-dev libtdb-dev libperl-dev \
            libpcre2-dev libssl-dev libsqlite3-dev libradcli-dev \
            liblmdb-dev libldap2-dev libmysqlclient-dev libpq-dev \
            libopendmarc-dev

      # -------------------------------------------------------------------
      # Stage 1: Format Check (cargo fmt --check)
      # -------------------------------------------------------------------
      - name: "Stage 1: Format check (cargo fmt --check)"
        run: cargo fmt --check

      # -------------------------------------------------------------------
      # Stage 2: Lint (cargo clippy -- -D warnings)
      # -------------------------------------------------------------------
      - name: "Stage 2: Clippy lint (cargo clippy -- -D warnings)"
        run: cargo clippy --workspace -- -D warnings

      # -------------------------------------------------------------------
      # Stage 3: Test (cargo test --workspace)
      # -------------------------------------------------------------------
      - name: "Stage 3: Test suite (cargo test --workspace)"
        run: cargo test --workspace

      # -------------------------------------------------------------------
      # Stage 4: Release Build (cargo build --release)
      # -------------------------------------------------------------------
      - name: "Stage 4: Release build (cargo build --release)"
        run: cargo build --release

      # -------------------------------------------------------------------
      # Post: Verify binary
      # -------------------------------------------------------------------
      - name: Verify Exim binary
        run: ./target/release/exim --version
